<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CHART よくある質問</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap');
:root{--teal:#1F9C8C;--coral:#FF8A5C;--peach:#FFE8DC;--cream:#FFF9F2;--ink:#3D3A37;--inksoft:#8A857E;--line:#F0E0D2;}
*{box-sizing:border-box;}
body{margin:0;background:var(--cream);color:var(--ink);font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;}
button{font:inherit;cursor:pointer;background:none;border:none;padding:0;color:inherit;}
.wrap{max-width:34rem;margin:0 auto;padding:32px 20px 60px;}
.header{text-align:center;margin-bottom:24px;}
.eyebrow{font-family:'M PLUS Rounded 1c',sans-serif;font-size:11px;letter-spacing:.25em;color:var(--coral);}
.title{font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:24px;color:var(--teal);margin:6px 0 6px;}
.brand-logo{display:block;height:32px;width:auto;margin:0 auto 10px;}
.subtitle{font-size:13px;color:var(--inksoft);}
.searchbox{position:relative;margin:20px 0 10px;}
.searchbox input{width:100%;padding:14px 44px 14px 18px;border:2px solid var(--line);border-radius:999px;font-size:15px;font-family:inherit;outline:none;background:#fff;}
.searchbox input:focus{border-color:var(--coral);}
.searchbox .clr{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:20px;color:var(--inksoft);}
.viewtabs{display:flex;gap:8px;margin:10px 0 20px;}
.vtab{flex:1;padding:10px 0;text-align:center;border-radius:999px;font-family:'M PLUS Rounded 1c',sans-serif;font-weight:700;font-size:13px;color:var(--inksoft);background:#fff;border:1.5px solid var(--line);}
.vtab.on{background:var(--teal);color:#fff;border-color:var(--teal);}
.catbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.catchip{padding:7px 14px;border-radius:999px;font-size:12.5px;font-weight:700;background:#fff;border:1.5px solid var(--line);color:var(--ink);}
.catchip.on{background:var(--coral);color:#fff;border-color:var(--coral);}
.count{font-size:12px;color:var(--inksoft);margin-bottom:12px;}
.cat-section{margin-bottom:24px;}
.cat-head{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:17px;color:var(--teal);margin:0 0 12px;display:flex;align-items:center;gap:8px;}
.qa{background:#fff;border:1.5px solid var(--line);border-radius:16px;margin-bottom:8px;overflow:hidden;box-shadow:0 2px 8px rgba(61,58,55,.04);}
.qa-q{width:100%;text-align:left;padding:16px 18px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.qa-qtext{font-weight:700;font-size:14.5px;line-height:1.55;}
.qa-cat{display:inline-block;font-size:10px;font-weight:700;color:var(--coral);background:var(--peach);padding:2px 8px;border-radius:999px;margin-bottom:6px;}
.qa-arrow{font-size:13px;color:var(--inksoft);flex-shrink:0;margin-top:3px;transition:transform .2s;}
.qa-arrow.rot{transform:rotate(180deg);}
.qa-a{padding:0 18px 16px;font-size:13.5px;line-height:1.85;color:var(--ink);border-top:1px solid var(--line);padding-top:14px;}
mark{background:#FFE08A;color:inherit;padding:0 1px;border-radius:2px;}
.empty{text-align:center;color:var(--inksoft);font-size:14px;padding:40px 0;line-height:1.8;}
/* コンビニ */
.best-tagline{font-size:12.5px;color:var(--inksoft);margin-bottom:12px;line-height:1.6;}
.best-catbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.best-chip{padding:8px 13px;border-radius:999px;font-size:12px;font-weight:700;background:#fff;border:1.5px solid var(--line);color:var(--ink);}
.best-chip.on{background:var(--teal);color:#fff;border-color:var(--teal);}
.best-title{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:18px;color:var(--teal);margin:4px 0 12px;}
.conv-intro{background:var(--peach);border:1.5px solid var(--coral);border-radius:16px;padding:16px;font-size:13px;line-height:1.7;color:var(--ink);margin-bottom:16px;}
.conv-card{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(61,58,55,.04);}
.conv-rank{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:999px;background:var(--teal);color:#fff;font-family:'M PLUS Rounded 1c',sans-serif;font-weight:800;font-size:14px;margin-right:8px;}
.conv-name{font-weight:700;font-size:15px;color:var(--ink);}
.conv-macro{display:inline-block;font-size:11.5px;font-weight:700;color:var(--teal);background:#E8F6F3;padding:3px 10px;border-radius:999px;margin:8px 0;}
.conv-price{font-family:'M PLUS Rounded 1c',sans-serif;font-size:12px;color:var(--inksoft);float:right;}
.conv-desc{font-size:12.5px;line-height:1.7;color:var(--inksoft);}
/* スライド */
.slide-wrap{position:relative;}
.slide{background:#fff;border:2px solid var(--line);border-radius:20px;padding:28px 22px;min-height:340px;display:flex;flex-direction:column;box-shadow:0 4px 16px rgba(61,58,55,.06);}
.slide-cat{display:inline-block;align-self:flex-start;font-size:11px;font-weight:700;color:#fff;background:var(--coral);padding:4px 12px;border-radius:999px;margin-bottom:16px;}
.slide-q{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:20px;line-height:1.5;color:var(--teal);margin-bottom:18px;}
.slide-a{font-size:14.5px;line-height:1.9;color:var(--ink);flex:1;}
.slide-nav{display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.slide-btn{padding:12px 24px;border-radius:999px;font-family:'M PLUS Rounded 1c',sans-serif;font-weight:700;font-size:14px;background:var(--teal);color:#fff;}
.slide-btn:disabled{background:var(--line);color:var(--inksoft);}
.slide-count{font-family:'M PLUS Rounded 1c',sans-serif;font-size:13px;color:var(--inksoft);}
.slide-jump{display:flex;flex-wrap:wrap;gap:5px;margin-top:16px;justify-content:center;}
.slide-dot{width:9px;height:9px;border-radius:999px;background:var(--line);border:none;padding:0;}
.slide-dot.on{background:var(--coral);width:22px;}
.backtop{position:fixed;right:16px;bottom:16px;z-index:30;width:52px;height:52px;border-radius:999px;background:var(--teal);color:#fff;font-size:22px;box-shadow:0 4px 14px rgba(31,156,140,.4);display:flex;align-items:center;justify-content:center;border:none;}
.backrow{margin-bottom:14px;}
.backbtn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:999px;background:#fff;border:1.5px solid var(--teal);color:var(--teal);font-family:'M PLUS Rounded 1c',sans-serif;font-weight:700;font-size:13px;}
.footer-note{font-size:11px;color:var(--inksoft);line-height:1.7;text-align:center;margin-top:32px;}
</style>
</head>

var FAQ = [["習慣", "運動がまったく続きません。どうすれば続けられますか?", "「毎日1時間」より「週2回15分」から。人は大きすぎる目標で挫折します。まずは絶対に達成できる小ささから始め、できた自分をほめてください。続いた実績が自信になり、自然と量を増やせるようになります。"], ["習慣", "三日坊主で終わらないコツはありますか?", "「完璧にやること」を目指さず「やめないこと」を目指しましょう。1日サボっても、翌日戻れば継続です。カレンダーに○をつける、決まった時間に行うなど「考えなくても始まる仕組み」を作るのが効果的です。"], ["習慣", "モチベーションが上がりません。", "モチベーションは「やる気が出てから動く」のではなく「動いたら出てくる」もの。まず靴を履く、マットを敷くなど、最初のひと動作だけやってみてください。始めてしまえば意外と続きます。"], ["習慣", "忙しくて時間が取れません。", "まとまった時間は不要です。歯磨き中のスクワット、通勤で一駅歩く、エレベーターを階段に。生活の中に運動を「埋め込む」発想が、忙しい人には最も続きます。"], ["習慣", "何から始めればいいか分かりません。", "まずは「今の自分より少しだけ動く」ことから。ウォーキング、ラジオ体操、スクワット10回でも立派なスタートです。正しさより「始めること」を優先してください。"], ["習慣", "運動する時間帯はいつがいいですか?", "続けやすい時間がベストです。朝は1日の代謝スイッチが入り、夕方は体温が高くパフォーマンスが出やすいという特徴はありますが、「自分が確実に時間を取れる時間帯」に勝るものはありません。"], ["習慣", "目標の立て方が分かりません。", "「3ヶ月で3kg」のように期限と数字を決め、さらに「そのために週何回動くか」まで分解しましょう。大きな目標だけだと途中で迷子になります。小さな行動目標が道しるべになります。"], ["習慣", "サボってしまった後、罪悪感がすごいです。", "1日や2日のオフで積み上げは崩れません。むしろ休養は成長の一部です。罪悪感より「明日また戻ろう」の切り替えが、長く続ける人の共通点です。"], ["習慣", "記録はつけたほうがいいですか?", "はい、続く人ほど記録しています。体重・回数・写真のどれか1つでOK。数字や見た目の変化が「見える」と、それ自体がごほうびになりモチベーションになります。"], ["習慣", "家だとどうしてもダラけてしまいます。", "「運動する場所」を1つ決めるのが効果的です。マットを敷いたらスイッチON、というように場所と行動を結びつけると、脳が切り替わりやすくなります。着替えるだけでも効果があります。"], ["習慣", "1人だと続かない性格です。", "仲間やトレーナーに「今日やった」と報告する仕組みを作りましょう。人に見られている感覚は継続の強力な後押しになります。CHARTのようにプロに伴走してもらうのも一つの手です。"], ["習慣", "完璧にやらないと気が済まず、逆に始められません。", "完璧主義は継続の大敵です。「60点で十分」と考えてください。フォームが多少崩れても、時間が短くても、やらないより100倍価値があります。まず動くことを優先しましょう。"], ["習慣", "目標を達成した後、リバウンドしないか不安です。", "達成後は「維持カロリー」に戻し、運動習慣だけキープするのがコツです。急に全部やめると戻りやすいので、頻度を減らしてでも続けること。習慣が残っていればリバウンドは防げます。"], ["習慣", "運動を始める前に病院に行くべきですか?", "持病がある方、しばらく運動していなかった方、妊娠中・産後の方、痛みがある方は、始める前に医師に相談すると安心です。不安がある場合は無理せず専門家に確認しましょう。"], ["減量", "体重が落ちません。なぜですか?", "多くは「隠れカロリー」が原因です。調理油・飲み物・味付け・つまみ食いを3日間だけ記録してみてください。また体重は水分で1〜2kg変動するので、1〜2週間の平均で見るのが正解です。"], ["減量", "停滞期に入りました。どうすれば?", "焦って食事を削るのは最後の手段です。まず記録の見直し→体重以外(見た目・服のフィット)の確認→歩数を増やす、の順で。それでも2週間動かなければ少しだけカロリーを調整します。"], ["減量", "食事制限だけで痩せられますか?", "短期的には可能ですが、筋肉も一緒に落ちて代謝が下がり、リバウンドしやすくなります。運動を組み合わせると筋肉を守りながら脂肪を落とせるので、結果的に楽に続けられます。"], ["減量", "1ヶ月で何kg痩せるのが健康的ですか?", "体重の約5%以内、目安として月1〜2kgペースが健康的です。それ以上早いと筋肉の減少や体調不良、リバウンドのリスクが高まります。ゆっくりのほうが確実に定着します。"], ["減量", "お腹の脂肪だけ落としたいです。", "残念ながら「部分痩せ」は科学的に難しく、脂肪は全身から均等に落ちていきます。腹筋運動でお腹は引き締まりますが、上に脂肪が乗っていると見えません。全身の減量+筋トレが近道です。"], ["減量", "基礎代謝を下回る食事はダメですか?", "おすすめできません。基礎代謝を割る食事は、筋肉の減少・体調不良・強いリバウンドを招きやすい方法です。足りない分は食事を削るより、歩数や運動を増やして作るほうが安全で続きます。"], ["減量", "有酸素運動と筋トレ、どちらが痩せますか?", "両方が理想です。有酸素はその場でカロリーを消費し、筋トレは筋肉を維持・増加させて「痩せやすい体」を作ります。時間がなければ筋トレ優先、余裕があれば仕上げに有酸素を足しましょう。"], ["減量", "空腹がつらくて続きません。", "タンパク質と食物繊維(野菜)を増やすと満腹感が長持ちします。また空腹の一部は水分不足のサイン。水を飲む、よく噛む、を試してください。極端な我慢は反動が来るので避けましょう。"], ["減量", "チートデイは必要ですか?", "必須ではありませんが、長期の減量では停滞打破や気分転換に役立つことがあります。行うなら頻度と量を決めて計画的に。無計画な「ごほうび」が習慣化すると逆効果なので注意しましょう。"], ["減量", "夜遅く食べると太りますか?", "時間そのものより「1日の総カロリー」が重要です。ただ夜遅い食事は活動で消費されにくく、つい食べ過ぎやすい傾向はあります。夜は軽めに、タンパク質中心にするのがおすすめです。"], ["減量", "糖質制限は効果ありますか?", "短期的に体重が落ちやすい方法ですが、多くは水分の減少です。極端な制限は続けにくく、筋力低下や集中力の低下も。糖質は「減らしすぎず、質と量を選ぶ」のが長続きのコツです。"], ["減量", "停滞期はどれくらい続きますか?", "個人差がありますが、数週間で抜けることが多いです。体が新しい体重に慣れるための一時的な調整期間なので、焦らず今のやり方を続けるか、活動量を少し増やして様子を見ましょう。"], ["減量", "運動しているのに体重が増えました。", "筋肉がついた、水分を溜めている、などが考えられます。特に運動を始めた直後は筋肉に水分が蓄えられ一時的に増えることも。体重より見た目やウエストの変化で判断するのが賢明です。"], ["減量", "お酒を飲みながらでも痩せられますか?", "可能ですが、アルコール自体にカロリーがあり(1g約7kcal)、おつまみも進みやすいので工夫が必要です。飲む日は食事を軽めに、蒸留酒や糖質の少ないものを選び、頻度を決めましょう。"], ["減量", "停滞期にダイエットブレイクとは?", "1〜2週間、あえて維持カロリーに戻す方法です。減量が長引くと体が省エネモードになるため、一度戻すことで代謝と気持ちがリフレッシュし、再開後に体重が動き出すことがあります。"], ["減量", "リバウンドを繰り返しています。", "急激な減量と反動の悪循環が原因のことが多いです。今回は「ゆっくり・運動と併用・達成後も習慣キープ」を意識してください。ゆっくり落とした体重ほど戻りにくいのが鉄則です。"], ["筋トレ", "筋トレは毎日やってもいいですか?", "同じ部位は48〜72時間空けるのが基本です。筋肉は休んでいる間に成長するため(超回復)、毎日やりたい場合は部位を分けましょう。全身を毎日追い込むのは逆効果になりがちです。"], ["筋トレ", "何回・何セットやればいいですか?", "目安は「10〜15回×3セット」で、最後の数回がきついくらいの負荷です。楽々できるなら回数や負荷を上げましょう。フォームが崩れるほどの重さや回数は、効果より怪我のリスクが上回ります。"], ["筋トレ", "筋肉痛のときも運動していいですか?", "強い筋肉痛のある部位は休ませ、別の部位を動かすか軽い有酸素・ストレッチにしましょう。軽い張り程度なら動いてOK。痛みが引かない・鋭い痛みがある場合は無理をしないでください。"], ["筋トレ", "女性が筋トレするとムキムキになりますか?", "なりません。女性はムキムキになるホルモンが男性より圧倒的に少なく、通常の筋トレでは引き締まった体になります。ボディビルダーのような体は特別な訓練と食事の結果なので安心してください。"], ["筋トレ", "筋トレの効果はいつ出ますか?", "体感は個人差がありますが、フォームの習得は数週間、見た目の変化は2〜3ヶ月が一つの目安です。まず「扱える回数・重さが増える」変化が先に来ます。それ自体が成長のサインです。"], ["筋トレ", "自重トレーニングだけで筋肉はつきますか?", "つきます。特に運動初心者は自重でも十分な刺激になります。物足りなくなったら、回数を増やす・動作をゆっくりする・片脚にするなど負荷を上げれば、器具なしでも成長を続けられます。"], ["筋トレ", "プロテインを飲まないと筋肉はつきませんか?", "食事で十分なタンパク質が摂れていれば必須ではありません。プロテインは「食事で足りない分を手軽に補う道具」です。まず食事を優先し、不足するなら活用する、という順番で考えましょう。"], ["筋トレ", "筋トレ前後のストレッチは必要ですか?", "前は動的ストレッチ(体を動かす準備運動)で体を温め、後は静的ストレッチ(じっくり伸ばす)で回復を促すのが理想です。怪我予防と柔軟性の維持につながるので、短時間でも取り入れましょう。"], ["筋トレ", "呼吸はどうすればいいですか?", "基本は「力を入れるとき(持ち上げる)に吐く、戻すときに吸う」です。息を止めると血圧が上がりやすいので、動作中は呼吸を続けることを意識してください。慣れると自然にできるようになります。"], ["筋トレ", "重い重量と軽い重量、どちらがいいですか?", "目的次第です。筋力・筋肥大には最後の数回がきつい重さ、引き締め・持久力には軽めで回数多め。ただし初心者はまず軽めでフォームを固めるのが安全で、結果的に近道になります。"], ["筋トレ", "効いている感じがしません。", "動作が速すぎる、可動域が狭い、対象の筋肉を意識できていない、などが原因かも。ゆっくり大きく動かし、鍛えている部位に触れて「効いてる」と意識するだけで刺激が変わります。"], ["筋トレ", "トレーニングの順番はありますか?", "大きな筋肉(脚・胸・背中)を先、小さな筋肉(腕・肩)を後にするのが基本です。大きな種目は消費エネルギーも多いため、元気なうちに行うと効率よく追い込めます。"], ["筋トレ", "部位分割(スプリット)とは何ですか?", "トレーニングを部位ごとに日で分ける方法です。週4〜5回なら上半身と下半身、週6回以上なら押す・引く・脚に分けると、各部位をしっかり休ませながら頻度を上げられます。"], ["筋トレ", "漸進性過負荷とは何ですか?", "少しずつ負荷を増やしていく原則です。同じ内容を続けると体が慣れて成長が止まるため、余裕が出たら回数・重さ・難易度を上げます。「昨日より少しだけ」の積み重ねが体を変えます。"], ["筋トレ", "筋トレするとき痛みがあります。", "「効いている張り」と「鋭い痛み・関節の痛み」は別物です。後者はフォームの崩れや負荷過多のサインなので、すぐ中止してください。痛みが続く場合は無理せず専門家に相談しましょう。"], ["筋トレ", "年齢が高くても筋肉はつきますか?", "つきます。筋肉は何歳からでも成長します。むしろ加齢で筋肉は落ちやすいので、続けることの価値は年齢とともに高まります。無理のない負荷から、回復を長めにとって進めましょう。"], ["ピラティス", "ピラティスとヨガの違いは何ですか?", "ざっくり言うと、ピラティスは体幹強化と姿勢改善に重点を置く「動くエクササイズ」、ヨガは柔軟性と呼吸・瞑想に重点を置く「整える要素の強い」ものです。目的で選ぶとよいでしょう。"], ["ピラティス", "ピラティスは痩せますか?", "直接的な消費カロリーは有酸素より控えめですが、体幹が整い姿勢が良くなることで見た目が引き締まり、動きやすい体になります。筋トレや食事と組み合わせると、より効果を実感できます。"], ["ピラティス", "運動が苦手でもピラティスはできますか?", "はい、むしろ運動が苦手な方や体力に自信のない方にも向いています。呼吸と小さな動きが中心で、自分のペースで行えます。まずは基本の動きから、無理なく始められます。"], ["ピラティス", "ピラティスの効果はどれくらいで出ますか?", "「10回で気分が良くなり、20回で見た目が変わり、30回で体が変わる」という有名な言葉があります。まず姿勢や体の使い方の変化を、続けるうちに実感できるようになります。"], ["姿勢", "猫背を直したいです。", "背中を反らすより、まず固まった胸を開き、弱った背中を鍛えるのが近道です。キャットアンドカウで背骨を動かし、引く種目(ローイング等)で背中を鍛えましょう。デスクワークの合間の胸開きも効果的です。"], ["姿勢", "反り腰を改善したいです。", "お腹の深部(体幹)ともも裏が弱く、腰が反りやすい状態です。デッドバグやヒップリフトでお腹とお尻を鍛え、股関節の前側をストレッチしましょう。反らせない体の使い方を覚えるのが鍵です。"], ["姿勢", "肩こりがひどいです。運動で治りますか?", "肩甲骨まわりを動かす運動やストレッチで血流が良くなり、楽になることが多いです。ただし強い痛みやしびれがある場合は、まず医療機関で原因を確認してください。予防には姿勢改善が有効です。"], ["姿勢", "デスクワークで体が固まります。", "1時間に1回立ち上がるだけでも違います。肩回し、胸開き、股関節ストレッチを各30秒。「動かさない時間を作らない」ことが、こりや張りの予防に最も効果的です。"], ["柔軟性", "体が硬いのですが運動できますか?", "もちろんできます。硬さは運動を始めない理由になりません。むしろ動かすうちに少しずつ柔らかくなります。反動をつけず、痛気持ちいいところで止めて呼吸する、を続けてみてください。"], ["柔軟性", "ストレッチはいつやるのが効果的ですか?", "体が温まった運動後やお風呂上がりが伸びやすくおすすめです。運動前は反動をつけない範囲で軽く、じっくり伸ばすのは運動後に。毎日少しずつ続けるほど柔軟性は高まります。"], ["柔軟性", "開脚できるようになりたいです。", "焦らず毎日少しずつが鉄則です。もも裏・内もも・股関節を痛くない範囲で伸ばし、呼吸を続けましょう。反動で無理に開くと怪我のもと。数ヶ月単位でゆっくり可動域を広げていきましょう。"], ["柔軟性", "ストレッチで痛みを感じます。", "「痛気持ちいい」を超える痛みは伸ばしすぎのサインです。筋肉や関節を傷める恐れがあるので、痛みの手前で止めてください。呼吸を止めず、じんわり伸ばすのが安全で効果的です。"], ["食事", "PFCバランスとは何ですか?", "P(タンパク質)・F(脂質)・C(炭水化物)という3大栄養素のバランスのことです。目的に応じて配分を変えます。減量ならタンパク質多め・脂質控えめ、というように調整すると効率が上がります。"], ["食事", "タンパク質はどれくらい摂ればいいですか?", "運動する人の目安は体重1kgあたり1.6〜2.2gです。体重60kgなら約100〜130g。3食に分けて摂ると吸収効率が良く、筋肉の維持・成長に役立ちます。まずは毎食に手のひら1枚分の肉・魚・卵などを。"], ["食事", "タンパク質が多い食品は何ですか?", "鶏むね肉、白身魚、卵、豆腐、納豆、ギリシャヨーグルト、ツナ缶などが手軽です。特に鶏むね肉やツナ缶は高タンパク・低脂質でコスパも良く、体づくりの定番食材です。"], ["食事", "炭水化物は抜いたほうがいいですか?", "抜く必要はありません。炭水化物は運動のエネルギー源で、極端に減らすと力が出ず筋肉も落ちやすくなります。「白米を玄米に」「量を適量に」など、抜くより選ぶ・調整するのがおすすめです。"], ["食事", "脂質は減らすべきですか?", "減らしすぎもNGです。脂質はホルモンや肌の健康に必要です。減らすなら揚げ物や加工食品の「質の悪い脂」から。ナッツ・魚・オリーブオイルなど良質な脂は適量とりましょう。"], ["食事", "コンビニで買えるおすすめ高タンパク食品は?", "サラダチキン、ゆで卵、ギリシャヨーグルト、焼き魚パック、ツナ、豆腐バー、プロテインドリンク、枝豆、鯖の水煮缶などが定番です。忙しい日でもコンビニで十分タンパク質を確保できます。"], ["食事", "朝食は食べたほうがいいですか?", "1日の総カロリーとタンパク質が摂れていれば、朝食の有無は個人の生活次第です。ただ朝にタンパク質を摂ると筋肉維持や食べ過ぎ防止に役立つという報告も。抜くなら他の食事で補いましょう。"], ["食事", "間食してもいいですか?", "OKです。むしろ空腹を我慢しすぎると次の食事でドカ食いしがち。ナッツ、ゆで卵、ヨーグルト、高カカオチョコなど、タンパク質や食物繊維のある間食を選べば、むしろ味方になります。"], ["食事", "水はどれくらい飲めばいいですか?", "目安は1日1.5〜2Lです。運動する日はさらに多めに。喉が渇く前にこまめに飲みましょう。空腹感の一部は水分不足のサインなので、水を飲むだけで無駄な間食が減ることもあります。"], ["食事", "外食が多くても大丈夫ですか?", "工夫すれば大丈夫です。「タンパク源の主菜+ご飯の量」の2点だけ意識すればOK。定食スタイルを選ぶ、揚げ物より焼き・蒸しを選ぶ、野菜を足す。完璧でなくても方向性が合っていれば十分です。"], ["食事", "調味料もカロリーに含めるべきですか?", "はい、意外な盲点です。油大さじ1で約110kcal、ドレッシングや砂糖・みりんも積み重なります。「ヘルシーな食材なのに痩せない」時は、調味料が原因のことが少なくありません。"], ["食事", "野菜はどれくらい食べればいいですか?", "毎食に両手にのるくらい(約120g以上)が目安です。食物繊維で満腹感が続き、ビタミン・ミネラルも補えます。低カロリーなのでたくさん食べてOK。かさ増しにも役立ちます。"], ["食事", "作り置きは体づくりに役立ちますか?", "とても役立ちます。鶏むねを茹でる、野菜を切るなど週末にまとめて準備すると、忙しい日でも健康的な食事を選べます。「用意されている」状態が、続ける最大の助けになります。"], ["食事", "甘いものがやめられません。", "完全に禁止すると反動が来ます。高カカオチョコやフルーツ、プロテインスイーツなど「マシな選択肢」に置き換えたり、量と頻度を決めて楽しむのが現実的です。適度に付き合うほうが長続きします。"], ["食事", "食べる順番は関係ありますか?", "野菜・タンパク質を先に、炭水化物を後にすると、血糖値の急上昇を抑え、満腹感も得やすくなります。同じ食事でも順番を変えるだけで体への影響が変わるので、試す価値ありです。"], ["食事", "カロリー計算は必ず必要ですか?", "必須ではありませんが、最初の数週間だけでもやると「自分がどれくらい食べているか」の感覚が身につきます。慣れれば計算しなくても選べるようになります。まずは記録から始めましょう。"], ["食事", "太りにくい食べ方はありますか?", "よく噛んでゆっくり食べる、野菜から食べる、タンパク質を毎食摂る、が基本です。早食いは満腹を感じる前に食べ過ぎるので、一口ごとに箸を置くだけでも食べ過ぎ防止になります。"], ["食事", "プロテインはいつ飲むのがいいですか?", "運動後45分以内が吸収に良いとされますが、1日の総タンパク質量のほうが重要です。食事で不足する日の補食として、朝や間食に飲むのも有効。飲みやすいタイミングで続けましょう。"], ["食事", "プロテインの種類は何を選べばいい?", "減量中は脂質・糖質の少ないWPI、コスパ重視ならWPC、乳製品が苦手ならソイやピープロテインがおすすめです。まずは飲みやすく続けやすいものを。味も継続の大事な要素です。"], ["食事", "ダイエット中でも米は食べていいですか?", "食べてOKです。米は良質なエネルギー源で、抜くと力が出ず筋肉も落ちやすくなります。量を適量に調整し、玄米や雑穀米にすると腹持ちも栄養価も上がります。抜くより選ぶが正解です。"], ["回復", "睡眠は運動に関係ありますか?", "大いに関係します。筋肉の回復も脂肪の燃焼も、睡眠中に進みます。睡眠不足は食欲を乱し、太りやすく疲れやすい状態に。トレーニングと同じくらい「よく寝ること」を大切にしてください。"], ["回復", "何時間くらい寝ればいいですか?", "一般的に7〜8時間が目安ですが、個人差があります。日中に強い眠気がなく、すっきり動ける睡眠時間が自分の適量です。運動を頑張る時期ほど、回復のために睡眠を優先しましょう。"], ["回復", "休養日は本当に必要ですか?", "必要です。筋肉はトレーニング中ではなく休養中に成長します(超回復)。毎日追い込むと疲労が溜まり、かえって成長が止まったり怪我をしたりします。休むこともトレーニングの一部です。"], ["回復", "疲れが抜けません。", "オーバートレーニングや睡眠不足、栄養不足のサインかもしれません。思い切って数日休む、睡眠と食事を見直す勇気も大切です。休んでも抜けない強い疲労は、医療機関に相談しましょう。"], ["回復", "運動後に何をすると回復が早まりますか?", "軽いストレッチ、しっかりした睡眠、タンパク質と炭水化物の補給、入浴などが回復を助けます。動いた後に「伸ばす・食べる・寝る」を意識するだけで、翌日の体の軽さが変わります。"], ["回復", "アクティブレストとは何ですか?", "完全に休むのではなく、軽く体を動かして回復を促す休養法です。散歩、軽いストレッチ、ゆるいヨガなど。血流が良くなり疲労物質が流れやすくなるので、疲れた日にもおすすめです。"], ["メンタル", "運動はメンタルにも良いですか?", "とても良いです。運動はストレス軽減や気分の改善に役立つことが多くの研究で示されています。落ち込んだ時こそ、軽く体を動かすと気持ちが晴れやすくなります。心の健康法としても有効です。"], ["メンタル", "ストレスで食べ過ぎてしまいます。", "ストレス食いは意志の弱さではなく、体の反応です。まず責めないこと。散歩や深呼吸、湯船につかるなど「食べる以外のストレス発散」を1つ持っておくと、衝動が和らぎます。"], ["メンタル", "体型が気になって落ち込みます。", "変化はゆっくり訪れます。他人や過去の自分と比べず、「昨日より少し動けた」に目を向けてください。体を大切に扱う行動そのものが自己肯定感を育てます。焦らず、自分のペースで大丈夫です。"], ["メンタル", "やる気の波が激しいです。", "波があって当たり前です。やる気が高い日は貯金せず淡々と、低い日は「5分だけ」に切り替える。仕組みで乗り切る発想が大切です。波に一喜一憂せず、続けている事実を認めてあげましょう。"], ["メンタル", "周りの目が気になってジムに行けません。", "ほとんどの人は自分のことに集中していて、他人を気にしていません。それでも不安なら、空いている時間帯を選ぶ、自宅から始める、パーソナルで個別に見てもらうなど、環境を選ぶのも一つの手です。"], ["メンタル", "完璧にできない自分が嫌になります。", "完璧を目指すほど続きません。60点で十分、やらない日があってもOK。大切なのは「長く付き合うこと」です。自分に厳しすぎる人ほど、少し甘くするくらいがちょうどよく続きます。"], ["体", "部分痩せはできますか?", "基本的にできません。脂肪は特定の部位だけでなく全身から均等に落ちていきます。気になる部分の筋トレで引き締めることはできますが、その上の脂肪は全身の減量で落とす必要があります。"], ["体", "筋肉は脂肪に変わりますか?", "変わりません。筋肉と脂肪は別の組織です。「運動をやめて筋肉が落ち、代わりに脂肪が増えた」のを「変わった」と感じるだけ。逆に脂肪が筋肉になることもないので、それぞれ育て・減らす意識を。"], ["体", "運動すると足が太くなりませんか?", "一時的に筋肉が張って太く見えることはありますが、続けると引き締まります。むしろ脚の筋肉は代謝を上げ、下半身の脂肪を落とす助けに。太くなるのが不安なら回数多め・軽負荷で行いましょう。"], ["体", "生理中でも運動していいですか?", "体調が良ければ軽い運動はむしろ血流改善に役立ちます。つらい日は無理せず休んでOK。この時期は体重が増えやすく停滞しやすいですが、水分によるもので一時的なので気にしすぎないでください。"], ["体", "むくみを解消したいです。", "水分・塩分のとり方、長時間の同じ姿勢が原因のことが多いです。こまめに動く、ふくらはぎを使う運動、水をしっかり飲む(意外にも)、塩分控えめが有効。着圧ソックスや入浴も助けになります。"], ["体", "体脂肪率はどれくらいが理想ですか?", "目安として男性は10〜19%、女性は20〜29%が標準的な健康範囲とされます。低すぎても健康を損なうので、極端を目指さず、動きやすく健康的な範囲を目標にしましょう。個人差もあります。"], ["体", "BMIは気にすべきですか?", "健康の目安にはなりますが、筋肉量を反映しないため万能ではありません。筋肉の多い人は高めに出ます。体重や見た目、体脂肪率と合わせて総合的に見るのがおすすめです。数字に振り回されないこと。"], ["体", "運動しても効果を感じません。", "変化は「体重→見た目→体力」など、見えにくい部分から起きています。数週間〜数ヶ月単位で見てください。写真やサイズの記録をつけると、体重に表れない変化に気づけます。継続が一番の近道です。"], ["体", "代謝を上げるには?", "筋肉を増やすことが最も確実です。加えて、こまめに動く(NEAT)、しっかり食べる(極端な制限は代謝を下げる)、よく寝る、水分をとる。日常の活動量を上げることが、地味ですが効果的です。"], ["体", "運動と食事、どちらが大事ですか?", "目的によりますが、減量は食事の影響が大きく、体づくり・健康は両方が必要です。「食事8割・運動2割」と言われることもありますが、運動は筋肉維持や健康・メンタルに不可欠。どちらも大切に、が答えです"]];

function norm(s){ return (s||"").toLowerCase(); }
function esc(s){ return s; }
function hl(text, q){
  if(!q) return text;
  var lo = norm(text), lq = norm(q), out = "", i = 0;
  while(true){
    var idx = lo.indexOf(lq, i);
    if(idx === -1){ out += text.slice(i); break; }
    out += text.slice(i, idx) + "<mark>" + text.slice(idx, idx+q.length) + "</mark>";
    i = idx + q.length;
  }
  return out;
}
function filtered(){
  var q = state.query.trim();
  return FAQ.map(function(item,i){ return {c:item[0], q:item[1], a:item[2], i:i}; })
    .filter(function(o){
      if(state.cat !== "all" && o.c !== state.cat) return false;
      if(q){ return (norm(o.q).indexOf(norm(q)) !== -1) || (norm(o.a).indexOf(norm(q)) !== -1) || (norm(LABEL[o.c]||o.c).indexOf(norm(q)) !== -1); }
      return true;
    });
}

  var isOpen = state.open[o.i];
  return '<div class="qa"><button class="qa-q" data-a="toggle" data-i="' + o.i + '">' +
    '<span><span class="qa-cat">' + (EMOJI[o.c]||"") + " " + (LABEL[o.c]||o.c) + '</span>' +
    '<span class="qa-qtext">' + hl(o.q, state.query) + '</span></span>' +
    '<span class="qa-arrow' + (isOpen?" rot":"") + '">▾</span></button>' +
    (isOpen ? '<div class="qa-a">' + hl(o.a, state.query) + '</div>' : '') + '</div>';
}

function listView(){
  var items = filtered();
  var html = '<div class="count">' + items.length + '件の質問' + (state.query?'(「'+state.query+'」で検索)':'') + '</div>';
  if(items.length === 0){
    return html + '<div class="empty">見つかりませんでした 🔍<br>別のキーワードでお試しください</div>';
  }
  if(state.query || state.cat !== "all"){
    // 検索/絞り込み時はフラット表示 + 戻る導線
    html = '<div class="backrow"><button class="backbtn" data-a="tolist">← すべての質問に戻る</button></div>' + html;
    html += items.map(qaCard).join('');
    return html;
  }
  // カテゴリ別セクション
  html += '<div class="catbar">' +
    '<button class="catchip' + (state.cat==="all"?" on":"") + '" data-a="cat" data-c="all">すべて</button>' +
    ORDER.map(function(c){ return '<button class="catchip" data-a="cat" data-c="' + c + '">' + (EMOJI[c]||"") + ' ' + (LABEL[c]||c) + '</button>'; }).join('') +
    '</div>';
  ORDER.forEach(function(c){
    var sec = items.filter(function(o){ return o.c === c; });
    if(sec.length === 0) return;
    html += '<div class="cat-section"><div class="cat-head">' + (EMOJI[c]||"") + ' ' + (LABEL[c]||c) + '</div>' +
      sec.map(qaCard).join('') + '</div>';
  });
  return html;
}

function slideView(){
  var items = filtered();
  if(items.length === 0){ return '<div class="empty">見つかりませんでした 🔍<br>別のキーワードでお試しください</div>'; }
  if(state.slideIdx >= items.length) state.slideIdx = 0;
  var o = items[state.slideIdx];
  var dots = items.map(function(_,i){ return '<button class="slide-dot' + (i===state.slideIdx?" on":"") + '" data-a="slidejump" data-i="' + i + '"></button>'; });
  if(dots.length > 40) dots = ['<span class="slide-count">' + (state.slideIdx+1) + ' / ' + items.length + '</span>'];
  return '<div class="backrow"><button class="backbtn" data-a="tolist">☰ 一覧で見る</button></div>' +
    '<div class="slide-wrap"><div class="slide">' +
    '<span class="slide-cat">' + (EMOJI[o.c]||"") + ' ' + (LABEL[o.c]||o.c) + '</span>' +
    '<div class="slide-q">' + hl(o.q, state.query) + '</div>' +
    '<div class="slide-a">' + hl(o.a, state.query) + '</div>' +
    '</div>' +
    '<div class="slide-nav">' +
    '<button class="slide-btn" data-a="slideprev"' + (state.slideIdx===0?" disabled":"") + '>← 前へ</button>' +
    '<span class="slide-count">' + (state.slideIdx+1) + ' / ' + items.length + '</span>' +
    '<button class="slide-btn" data-a="slidenext"' + (state.slideIdx>=items.length-1?" disabled":"") + '>次へ →</button>' +
    '</div>' +
    '<div class="slide-jump">' + dots.join('') + '</div></div>';
}

function convView(){
  var html = '<div class="backrow"><button class="backbtn" data-a="tolist">☰ 質問一覧へ</button></div>';
  html += '<div class="best-tagline">シーン別に、体づくりの味方になる商品をまとめました 🛍️</div>';
  html += '<div class="best-catbar">' + BEST_ORDER.map(function(k){
    var b = BEST[k];
    return '<button class="best-chip' + (state.bestCat===k?" on":"") + '" data-a="bestcat" data-k="' + k + '">' + b.emoji + " " + b.label + '</button>';
  }).join("") + '</div>';
  var cur = BEST[state.bestCat];
  html += '<div class="best-title">' + cur.emoji + " " + cur.label + ' ベスト10</div>';
  html += '<div class="conv-intro">' + cur.intro + '<br><span style="font-size:11px;color:var(--inksoft)">※栄養値・価格は目安です。商品や店舗により異なります</span></div>';
  html += cur.items.map(function(item, i){
    return '<div class="conv-card"><span class="conv-price">' + item[3] + '</span>' +
      '<div><span class="conv-rank">' + (i+1) + '</span><span class="conv-name">' + item[0] + '</span></div>' +
      '<div class="conv-macro">' + item[1] + '</div>' +
      '<div class="conv-desc">' + item[2] + '</div></div>';
  }).join("");
  return html;
}

function resultsHtml(){
  var body = state.view==="slide" ? slideView() : state.view==="conv" ? convView() : listView();
  var footer = '<div class="footer-note">※ここでの情報は一般的な健康・運動の知識にもとづく目安です。<br>体調や持病に不安がある方、妊娠中・産後の方は、医療機関や担当トレーナーにご相談ください。</div>';
  return body + footer;
}
// フル描画: 入力欄を生成(ページ初期化・タブ切替の土台)
function render(){
  document.getElementById('root').innerHTML =
    '<div class="wrap">' + header() + '<div id="results"></div></div>' +
    '<button class="backtop" data-a="backtop" aria-label="上へ戻る">↑</button>';
  paint();
  syncInput();
}
// 部分描画: 入力欄は触らない(IMEを壊さない)
function paint(){
  var tabs = document.getElementById('tabs');
  if(tabs) tabs.innerHTML = tabsHtml();
  var res = document.getElementById('results');
  if(res) res.innerHTML = resultsHtml();
  var clr = document.getElementById('q-clr');
  if(clr) clr.style.display = state.query ? '' : 'none';
}
function syncInput(){
  var inp = document.getElementById('q');
  if(inp && inp.value !== state.query) inp.value = state.query;
}

document.addEventListener('click', function(e){
  var t = e.target.closest('[data-a]');
  if(!t) return;
  var a = t.getAttribute('data-a');
  if(a==="view"){ state.view = t.getAttribute('data-v'); state.slideIdx = 0; paint(); }
  else if(a==="cat"){ state.cat = t.getAttribute('data-c'); state.slideIdx = 0; paint(); }
  else if(a==="toggle"){ var i = t.getAttribute('data-i'); state.open[i] = !state.open[i]; paint(); }
  else if(a==="clear"){ state.query = ""; state.slideIdx = 0; syncInput(); paint(); }
  else if(a==="slideprev"){ if(state.slideIdx>0) state.slideIdx--; paint(); }
  else if(a==="slidenext"){ state.slideIdx++; paint(); }
  else if(a==="slidejump"){ state.slideIdx = parseInt(t.getAttribute('data-i'),10); paint(); }
  else if(a==="tolist"){ state.view='list'; state.query=''; state.cat='all'; state.slideIdx=0; syncInput(); paint(); window.scrollTo(0,0); }
  else if(a==="backtop"){ window.scrollTo({top:0,behavior:'smooth'}); }
  else if(a==="bestcat"){ state.bestCat = t.getAttribute('data-k'); paint(); window.scrollTo(0,0); }
});

var composing = false;
document.addEventListener('compositionstart', function(e){ if(e.target && e.target.id==='q') composing = true; });
document.addEventListener('compositionend', function(e){
  if(e.target && e.target.id==='q'){ composing = false; state.query = e.target.value; state.slideIdx = 0; paint(); }
});
document.addEventListener('input', function(e){
  if(e.target && e.target.id==='q'){
    if(composing) return;                 // 変換中は確定を待つ
    state.query = e.target.value; state.slideIdx = 0; paint();  // 入力欄は再生成しない
  }
});

render();
</script>
</body>
</html>
